<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Protected Area</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 9999; display: flex; align-items: center; justify-content: center;">
        <div class="header">
            <h1>Verifying Access...</h1>
        </div>
    </div>

    <main class="auth-container" id="dashboard-container" style="max-width: 600px;">
        <div class="header">
            <span style="background: rgba(16, 185, 129, 0.1); color: var(--success); padding: 0.5rem 1rem; border-radius: 99px; font-size: 0.75rem; font-weight: 600; margin-bottom: 1rem; display: inline-block;">Secure Access Granted</span>
            <h1>Member Dashboard</h1>
            <p>Welcome to your exclusive space.</p>
        </div>

        <section class="profile-view">
            <div class="user-badge" id="user-initials">?</div>
            <div class="info-card" style="background: rgba(15, 23, 42, 0.4); padding: 1.5rem; border-radius: 16px; margin-bottom: 2rem; border: 1px solid var(--glass-border);">
                <p style="color: var(--text-muted); font-size: 0.875rem; margin-bottom: 0.5rem;">Logged in as:</p>
                <h3 id="user-email" style="font-size: 1.25rem;">loading...</h3>
            </div>

            <div class="grid-stats" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem;">
                <div style="background: rgba(255,255,255,0.03); padding: 1rem; border-radius: 12px; border: 1px solid var(--glass-border);">
                    <p style="color: var(--text-muted); font-size: 0.75rem;">Status</p>
                    <p style="font-weight: 600;">Active</p>
                </div>
                <div style="background: rgba(255,255,255,0.03); padding: 1rem; border-radius: 12px; border: 1px solid var(--glass-border);">
                    <p style="color: var(--text-muted); font-size: 0.75rem;">Plan</p>
                    <p style="font-weight: 600;">Premium</p>
                </div>
            </div>

            <div style="display: flex; gap: 1rem;">
                <button class="btn btn-secondary" id="logout-btn" style="flex: 1;">Sign Out</button>
                <a href="index.html" class="btn" style="flex: 1; text-decoration: none; text-align: center; display: flex; align-items: center; justify-content: center;">Back Home</a>
            </div>
        </section>
    </main>

    <script src="dashboard.js"></script>
</body>
</html>
